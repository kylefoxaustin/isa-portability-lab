name: ci

# Every push and PR: build both toolchain images, run the RISC-V self-test
# suite, and run the cross-target (RISC-V vs Cortex-M7) portability comparison.
on:
  push:
  pull_request:

# Opt JS-based actions into Node.js 24 ahead of the June 2026 default switch
# (silences the Node.js 20 deprecation warning; version-agnostic).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- toolchain images, built with layer caching ----------------------
      # cache-to/from (type=gha) reuses layers across runs, so the one-time
      # ~500MB xPack toolchain download in the RISC-V image isn't repeated.
      # load: true puts the image in the local daemon so `docker run` / the
      # compare script find it by tag (no rebuild).
      - name: Build RISC-V toolchain image (cached)
        uses: docker/build-push-action@v6
        with:
          context: riscv
          tags: riscv-baremetal:latest
          load: true
          cache-from: type=gha,scope=riscv-baremetal
          cache-to: type=gha,mode=max,scope=riscv-baremetal

      - name: Build Cortex-M7 toolchain image (cached)
        uses: docker/build-push-action@v6
        with:
          context: m7
          tags: m7-baremetal:latest
          load: true
          cache-from: type=gha,scope=m7-baremetal
          cache-to: type=gha,mode=max,scope=m7-baremetal

      # DSP arm: the Zephyr-SDK dc233c toolchain + qemu-system-xtensa.
      - name: Build Xtensa toolchain image (cached)
        uses: docker/build-push-action@v6
        with:
          context: xtensa
          tags: xtensa-baremetal:latest
          load: true
          cache-from: type=gha,scope=xtensa-baremetal
          cache-to: type=gha,mode=max,scope=xtensa-baremetal

      # ---- RISC-V bare-metal self-test suite -------------------------------
      - name: RVV self-test suite (must pass)
        run: docker run --rm -u "$(id -u):$(id -g)" -v "$PWD:/work" -w /work/riscv riscv-baremetal make test

      - name: Negative-path check (injected failure must be caught)
        run: docker run --rm -u "$(id -u):$(id -g)" -v "$PWD:/work" -w /work/riscv riscv-baremetal make test-negative

      # ---- cross-target portability comparison -----------------------------
      # compare.sh reuses the images built above (it only builds them if
      # missing). Fails the job if any portable kernel result diverges. The
      # report.py reporter also writes a Markdown table to the run's Job Summary
      # (GITHUB_STEP_SUMMARY) and a machine-readable report.json.
      - name: Cross-target comparison (results must match)
        run: REPORT_MD="$GITHUB_STEP_SUMMARY" REPORT_JSON=report.json make compare

      - name: Upload comparison report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portability-report
          path: report.json

      # Meta-check: the deliberately non-portable probes MUST diverge. If they
      # don't, the detector itself is broken - so a clean run here is failure.
      - name: Hazard detector self-check (probes must diverge)
        run: |
          if ./compare/compare.sh hazards; then
            echo "::error::hazard probes did not diverge - portability detector is broken"
            exit 1
          fi
          echo "hazard probes diverged as expected - detector OK"

      # ---- DSP arm: intrinsic-kernel equivalence ---------------------------
      # A DIFFERENT experiment from the portable-C comparison above: the RVV
      # (rv64) and dc233c (xtensa) legs run the shared DSP kernel harness, which
      # self-checks each hand-written intrinsic kernel against kernels/golden/.
      # Gates on the per-leg exit code (0 == every kernel bit-exact). Renders an
      # intrinsic-kernel table into the Job Summary, kept distinct from the
      # auto-lowering results above.
      - name: DSP arm (intrinsic kernels must be bit-exact vs golden)
        run: REPORT_MD="$GITHUB_STEP_SUMMARY" make compare-dsp

      # Informational only: how the same C compiled on each target (RVV vs
      # scalar, libcalls, instruction mix). Diagnostic, not a gate. Echoed to
      # the step log and folded into the Job Summary as a collapsible block.
      - name: Codegen fingerprint (informational)
        continue-on-error: true
        run: |
          out="$(make compare-codegen)"
          echo "$out"
          {
            echo '## Codegen fingerprint (informational)'
            echo '<details><summary>RISC-V vs Cortex-M7 instruction fingerprint</summary>'
            echo
            echo '```'
            printf '%s\n' "$out" | sed -n '/=== codegen/,$p'
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
